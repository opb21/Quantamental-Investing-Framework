strategy_name: "momentum"

market: UK
start_date: "2015-01-01"
end_date: "2026-02-01"

universe:
  file: "data/universe_uk_smallcap.csv"
  ticker_column: "ticker"
  ticker_suffix: ".L"              # appended to each ticker for yfinance (LSE-listed stocks)

pricing:
  source: "yfinance"
  price_field: "Adj Close"   # yfinance provides this
  frequency: "M"             # month-end for long-horizon momentum

signal:
  name: "blend_momentum"
  lookbacks: [3, 6, 12]        # periods to blend
  blend_weights: [1, 1, 1]     # equal-weighted (normalised automatically)
  skip_recent_months: 1
  vol_adjust: true              # divide each return by realised annualised vol (Sharpe momentum)
  vol_method: "rolling"         # "rolling" | "ewma"
  vol_window: null              # rolling only: null = dynamic (lookback × 21 days), int = static days
  ewma_lambda: 0.97             # ewma only; RiskMetrics default (α = 0.03, ~33-month memory)


portfolio:
  rebalance: "Q"             # quarter-end
  n_positions: 12
  weighting: "equal"         # "equal" | "inv_vol" | "momentum_inv_vol"
  n_tranches: 1              # 1 = standard; 3 = staggered monthly (overlapping portfolios)

costs:
  commission_bps: 10         # 0.10%
  slippage_bps: 50           # 0.50%

risk:
  window: 12                 # rolling window (periods) for vol, correlation, and contribution metrics

benchmark:
  ticker: "^FTSC"                  # FTSE Small Cap index (yfinance)
  name: "FTSE Small Cap"

outputs:
  runs_dir: "reports/runs"
  db_path: "reports/runs.db"